services:
  postgres:
    image: postgres:15-alpine
    container_name: study_postgres
    environment:
      POSTGRES_DB: study_db
      POSTGRES_USER: study_user
      POSTGRES_PASSWORD: study_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
      - ./friends_posts_tables.sql:/docker-entrypoint-initdb.d/friends_posts_tables.sql
    networks:
      - study_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U study_user -d study_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: study_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - study_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: study_redis_commander
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD:-redis_password}
    ports:
      - "8082:8081"
    networks:
      - study_network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: study_app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/study_db
      SPRING_DATASOURCE_USERNAME: study_user
      SPRING_DATASOURCE_PASSWORD: study_password
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
      SPRING_REDIS_TIMEOUT: 2000ms
      JWT_SECRET: ${JWT_SECRET:-mySuperSecretKeyForJWTTokenGenerationThatIsAtLeast32BytesLong2024!}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
    ports:
      - "8081:8081"
    networks:
      - study_network
    restart: unless-stopped

volumes:
  postgres_data:
    name: study_postgres_data
  redis_data:
    name: study_redis_data

networks:
  study_network:
    name: study_network
    driver: bridge
    external: true