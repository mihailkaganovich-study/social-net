x-auth-variables: &AUTH
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: postgres
  PGUSER: postgres
  PGPASSWORD: postgres
  POSTGRES_HOST_AUTH_METHOD: trust

services:

  master:
    container_name: "otus_citus_master"
    image: "citusdata/citus:12.1.3"
    ports:
      - "${COORDINATOR_EXTERNAL_PORT:-5432}:5432"
    labels:
      - "com.citusdata.role=Master"
    environment: *AUTH
    volumes:
      - master-data:/var/lib/postgresql/data
#      - ./init-base.sql:/docker-entrypoint-initdb.d/init-base.sql
    networks:
      - citus-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    image: "citusdata/citus:12.1.3"
    labels:
      - "com.citusdata.role=Worker"
    depends_on:
      manager:
        condition: service_healthy
    environment: *AUTH
    volumes:
      - healthcheck-volume:/healthcheck
    command: "/wait-for-manager.sh"
    networks:
      - citus-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  manager:
    container_name: "otus_citus_manager"
    image: "citusdata/membership-manager:0.3.0"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - healthcheck-volume:/healthcheck
    depends_on:
      master:
        condition: service_healthy
    environment: *AUTH
    networks:
      - citus-network
    healthcheck:
      test: ["CMD-SHELL", "test -f /healthcheck/manager-ready"]
      interval: 5s
      timeout: 3s
      retries: 10

  init-distributed:
    image: "citusdata/citus:12.1.3"
    depends_on:
      master:
        condition: service_healthy
      manager:
        condition: service_healthy
#      worker:
#        condition: service_healthy
    environment: *AUTH
    volumes:
      - ./scripts/init-distributed.sh:/init-distributed.sh
    command: >
      bash -c "
        chmod +x /init-distributed.sh &&
        sleep 10 &&
        /init-distributed.sh
      "
    networks:
      - citus-network
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: study_app
    depends_on:
      master:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://otus_citus_master:5432/postgres
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      JWT_SECRET: ${JWT_SECRET:-mySuperSecretKeyForJWTTokenGenerationThatIsAtLeast32BytesLong2024!}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
    ports:
      - "8081:8081"
    networks:
      - citus-network
    restart: unless-stopped

volumes:
  master-data:
    name: citus_master_data
  healthcheck-volume:

networks:
  citus-network:
    driver: bridge